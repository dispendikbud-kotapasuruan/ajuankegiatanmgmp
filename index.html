<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Administrasi - UPT SMP Negeri 1 Pasuruan</title>
    <style>
        /* Mengatur agar halaman memenuhi layar tanpa scrollbar tambahan */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Desain tampilan loading (indikator memuat) */
        #loading-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10; /* Menempatkan loading di atas iframe */
        }

        .spinner {
            border: 5px solid #e0e0e0;
            border-top: 5px solid #0056b3; /* Warna biru profesional */
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loading-screen p {
            color: #333;
            font-size: 16px;
            margin: 0;
        }

        /* Desain iframe aplikasi utama */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 20;
            opacity: 0; /* Disembunyikan sampai termuat penuh */
            transition: opacity 0.5s ease-in-out; /* Efek muncul yang halus */
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p>Memuat sistem administrasi murid... Mohon tunggu sebentar.</p>
    </div>

    <iframe 
        id="app-frame" 
        src="https://script.google.com/macros/s/AKfycbyazFd_UkAYnw8I5URwkTsKLtZvv_b0TZnRfNc50c2jExbN2l4u6S3C8VEvXOHeweOZ9w/exec" 
        onload="document.getElementById('app-frame').style.opacity = 1; document.getElementById('loading-screen').style.display = 'none';"
        allowfullscreen>
    </iframe>

</body>
</html>
